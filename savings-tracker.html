<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Savings Goal Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c0f;
  --surface: #13131a;
  --surface2: #1a1a24;
  --border: #252535;
  --border2: #2e2e45;
  --text: #e8e8f0;
  --muted: #5a5a7a;
  --muted2: #7a7a9a;
  --accent: #6c63ff;
  --accent2: #ff6b6b;
  --accent3: #43e8a0;
  --accent-glow: rgba(108,99,255,0.25);
  --yellow: #f5c542;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(108,99,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(108,99,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.ambient { position: fixed; pointer-events: none; z-index: 0; }
.ambient-1 {
  width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient(circle, rgba(108,99,255,0.08) 0%, transparent 70%);
  top: -200px; left: -200px;
}
.ambient-2 {
  width: 500px; height: 500px; border-radius: 50%;
  background: radial-gradient(circle, rgba(67,232,160,0.06) 0%, transparent 70%);
  bottom: -150px; right: -100px;
}

.wrapper {
  position: relative; z-index: 1;
  max-width: 680px; margin: 0 auto;
  padding: 3rem 1.5rem 5rem;
}

/* HEADER */
.header { margin-bottom: 3rem; animation: fadeUp 0.6s ease both; }

.header-tag {
  display: inline-flex; align-items: center; gap: 0.5rem;
  font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
  color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase;
  background: rgba(108,99,255,0.08); border: 1px solid rgba(108,99,255,0.2);
  padding: 0.35rem 0.85rem; border-radius: 99px; margin-bottom: 1.2rem;
}

.header-tag::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); box-shadow: 0 0 8px var(--accent);
  animation: pulse 2s infinite;
}

.title {
  font-size: clamp(3rem, 9vw, 5.5rem); font-weight: 800;
  line-height: 0.92; letter-spacing: -0.03em; margin-bottom: 1rem;
}

.title-grad {
  display: block;
  background: linear-gradient(135deg, var(--accent) 0%, #a78bfa 50%, var(--accent3) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

.header-meta { display: flex; align-items: center; gap: 1.5rem; margin-top: 1.2rem; flex-wrap: wrap; }

.header-stat {
  font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
  color: var(--muted2); letter-spacing: 0.04em;
}
.header-stat strong { color: var(--text); font-weight: 700; }
.hdr-divider { width: 1px; height: 18px; background: var(--border); }

/* TOTAL BAR */
.total-bar {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 1.3rem 1.5rem;
  margin-bottom: 2rem; display: flex; align-items: center;
  justify-content: space-between; gap: 1rem;
  animation: fadeUp 0.6s ease both 0.1s; position: relative; overflow: hidden;
}

.total-bar::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(108,99,255,0.04) 0%, transparent 60%);
  pointer-events: none;
}

.total-label {
  font-family: 'JetBrains Mono', monospace; font-size: 0.62rem;
  color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase;
  margin-bottom: 0.3rem;
}

.total-amount { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.02em; }
.total-amount span { font-size: 0.85rem; color: var(--muted2); font-weight: 400; }

.total-sub {
  font-family: 'JetBrains Mono', monospace; font-size: 0.62rem;
  color: var(--muted); margin-top: 0.2rem;
}
.total-sub em { color: var(--muted2); font-style: normal; }

.total-ring { width: 64px; height: 64px; flex-shrink: 0; position: relative; }
.total-ring svg { transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: var(--border2); stroke-width: 5; }
.ring-fill {
  fill: none; stroke: url(#ringGrad); stroke-width: 5;
  stroke-linecap: round; stroke-dasharray: 163; stroke-dashoffset: 163;
  transition: stroke-dashoffset 1s cubic-bezier(0.34,1.56,0.64,1);
}
.ring-label {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem; font-weight: 700; color: var(--accent);
}

/* GOAL CARD */
.goal-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; margin-bottom: 1.2rem; overflow: hidden;
  position: relative; transition: border-color 0.3s, box-shadow 0.3s;
  animation: fadeUp 0.5s ease both;
}
.goal-card:hover { border-color: var(--border2); box-shadow: 0 8px 40px rgba(0,0,0,0.3); }
.goal-card.complete { border-color: rgba(67,232,160,0.25); box-shadow: 0 0 30px rgba(67,232,160,0.06); }

.card-bar {
  position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: linear-gradient(180deg, var(--accent), #a78bfa);
}
.goal-card.complete .card-bar { background: linear-gradient(180deg, var(--accent3), #43e8c0); }

.card-header {
  padding: 1.4rem 1.5rem 1.2rem 1.5rem;
  display: flex; align-items: flex-start; gap: 1rem;
}

.card-emoji {
  width: 50px; height: 50px; display: flex; align-items: center;
  justify-content: center; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 14px;
  font-size: 1.5rem; flex-shrink: 0;
  transition: transform 0.2s;
}
.goal-card:hover .card-emoji { transform: scale(1.06) rotate(-3deg); }

.card-text { flex: 1; min-width: 0; }

.card-name {
  font-size: 0.95rem; font-weight: 700; letter-spacing: -0.01em;
  line-height: 1.3; margin-bottom: 0.3rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.card-meta { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }

.shop-tag {
  font-family: 'JetBrains Mono', monospace; font-size: 0.58rem;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted2);
  background: var(--surface2); border: 1px solid var(--border);
  padding: 0.2rem 0.6rem; border-radius: 6px;
}

.prod-link {
  font-family: 'JetBrains Mono', monospace; font-size: 0.58rem;
  color: var(--accent); text-decoration: none; letter-spacing: 0.06em;
  opacity: 0.75; transition: opacity 0.2s;
}
.prod-link:hover { opacity: 1; }

.card-price-block { text-align: right; flex-shrink: 0; }
.card-price { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; white-space: nowrap; }
.card-price-sub {
  font-family: 'JetBrains Mono', monospace; font-size: 0.58rem;
  color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase;
  margin-top: 0.15rem;
}

/* Progress */
.card-progress { padding: 0 1.5rem 1.2rem; }

.prog-stats {
  display: flex; justify-content: space-between;
  align-items: baseline; margin-bottom: 0.7rem;
}

.prog-saved {
  font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em; color: var(--accent3);
}

.prog-need {
  font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
  color: var(--muted); letter-spacing: 0.04em;
}
.prog-need .hl { color: var(--accent2); font-weight: 500; }

.prog-track {
  height: 8px; background: var(--surface2);
  border-radius: 99px; overflow: hidden; margin-bottom: 0.5rem;
}

.prog-fill {
  height: 100%; border-radius: 99px;
  background: linear-gradient(90deg, var(--accent), #a78bfa);
  transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1);
  position: relative;
}
.prog-fill::after {
  content: ''; position: absolute; right: 0; top: 0; bottom: 0;
  width: 20px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12));
}
.prog-fill.mid  { background: linear-gradient(90deg, var(--yellow), #f5a442); }
.prog-fill.low  { background: linear-gradient(90deg, var(--accent2), #ff9a6b); }
.prog-fill.done { background: linear-gradient(90deg, var(--accent3), #43e8c0); }

.prog-footer { display: flex; justify-content: space-between; align-items: center; }

.status-chip {
  display: inline-flex; align-items: center; gap: 0.35rem;
  padding: 0.22rem 0.7rem; border-radius: 99px;
  font-family: 'JetBrains Mono', monospace; font-size: 0.58rem;
  letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500;
}
.chip-done { background: rgba(67,232,160,0.1);  color: var(--accent3); border: 1px solid rgba(67,232,160,0.2); }
.chip-near { background: rgba(245,197,66,0.1);  color: var(--yellow);  border: 1px solid rgba(245,197,66,0.2); }
.chip-mid  { background: rgba(108,99,255,0.1);  color: #a78bfa;        border: 1px solid rgba(108,99,255,0.2); }
.chip-low  { background: rgba(255,107,107,0.08);color: var(--accent2); border: 1px solid rgba(255,107,107,0.2); }

.prog-pct {
  font-family: 'JetBrains Mono', monospace; font-size: 0.62rem;
  color: var(--muted); letter-spacing: 0.08em;
}

/* Card input row */
.card-inputs {
  border-top: 1px solid var(--border); padding: 1rem 1.5rem;
  display: flex; gap: 0.6rem; align-items: flex-end;
  background: rgba(0,0,0,0.15);
}
.input-group { flex: 1; }
.input-label {
  display: block; font-family: 'JetBrains Mono', monospace; font-size: 0.58rem;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
  margin-bottom: 0.4rem;
}
.input-wrap { position: relative; }
.input-prefix {
  position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%);
  font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
  color: var(--muted); pointer-events: none;
}

.cash-input {
  width: 100%; padding: 0.62rem 0.75rem 0.62rem 2.4rem;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem; font-weight: 500; color: var(--text);
  outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  -moz-appearance: textfield;
}
.cash-input::-webkit-outer-spin-button,
.cash-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.cash-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

.save-btn {
  padding: 0.62rem 1.1rem;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  color: #fff; border: none; border-radius: 10px;
  font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
  letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700;
  cursor: pointer; transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
  white-space: nowrap; flex-shrink: 0;
  box-shadow: 0 4px 15px rgba(108,99,255,0.3);
}
.save-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(108,99,255,0.4); }
.save-btn:active { transform: translateY(0); }

.del-btn {
  padding: 0.62rem 0.75rem; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 10px;
  color: var(--muted); font-size: 0.8rem; cursor: pointer; flex-shrink: 0;
  transition: color 0.2s, border-color 0.2s, background 0.2s;
}
.del-btn:hover { color: var(--accent2); border-color: rgba(255,107,107,0.3); background: rgba(255,107,107,0.05); }

/* ADD BUTTON */
.add-btn {
  width: 100%; padding: 1rem; background: transparent;
  border: 1px dashed var(--border2); border-radius: 18px;
  color: var(--muted); font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase;
  cursor: pointer; transition: color 0.2s, border-color 0.2s, background 0.2s;
  animation: fadeUp 0.5s ease both 0.4s; margin-top: 0.5rem;
}
.add-btn:hover { color: var(--accent); border-color: rgba(108,99,255,0.3); background: rgba(108,99,255,0.04); }

/* MODAL */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
  z-index: 100; align-items: center; justify-content: center; padding: 1.5rem;
}
.overlay.open { display: flex; }

.modal {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 22px; padding: 2rem; width: 100%; max-width: 440px;
  animation: fadeUp 0.3s ease;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(108,99,255,0.1);
  position: relative; overflow: hidden;
}
.modal::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent), #a78bfa, var(--accent3));
}

.modal-title { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 1.5rem; }
.modal-title span {
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

.form-row { margin-bottom: 1rem; }
.form-row .input-label { display: block; margin-bottom: 0.45rem; }
.form-2col { display: grid; grid-template-columns: 1fr 90px; gap: 0.8rem; }

.modal-input {
  width: 100%; padding: 0.7rem 0.9rem;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem; color: var(--text); outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.modal-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.modal-input::placeholder { color: var(--muted); }

.modal-actions { display: flex; gap: 0.7rem; margin-top: 1.5rem; }

.modal-cancel {
  padding: 0.75rem 1.1rem; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 10px; color: var(--muted2);
  font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
  letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
  transition: color 0.2s;
}
.modal-cancel:hover { color: var(--text); }

.modal-submit {
  flex: 1; padding: 0.75rem;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  color: #fff; border: none; border-radius: 10px;
  font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
  letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700;
  cursor: pointer; transition: opacity 0.2s, transform 0.15s;
  box-shadow: 0 4px 15px rgba(108,99,255,0.3);
}
.modal-submit:hover { opacity: 0.9; transform: translateY(-1px); }

/* TOAST */
.toast {
  position: fixed; bottom: 2rem; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 12px; padding: 0.75rem 1.4rem;
  font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
  letter-spacing: 0.08em; z-index: 200;
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 10px 40px rgba(0,0,0,0.4); white-space: nowrap; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--accent); }
  50%       { opacity: 0.5; box-shadow: 0 0 4px var(--accent); }
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

@media (max-width: 480px) {
  .title { font-size: 2.8rem; }
  .card-price { font-size: 1.2rem; }
  .header-meta { gap: 1rem; }
}
</style>
</head>
<body>

<div class="ambient ambient-1"></div>
<div class="ambient ambient-2"></div>

<div class="wrapper">

  <header class="header">
    <div class="header-tag">Savings Tracker</div>
    <h1 class="title">SPOŘÍCÍ<br><span class="title-grad">CÍLE</span></h1>
    <div class="header-meta">
      <div class="header-stat">Uloženo: <strong id="hdr-saved">0 Kč</strong></div>
      <div class="hdr-divider"></div>
      <div class="header-stat">Cílů: <strong id="hdr-count">0</strong></div>
      <div class="hdr-divider"></div>
      <div class="header-stat">Zbývá: <strong id="hdr-needed">0 Kč</strong></div>
    </div>
  </header>

  <div class="total-bar">
    <div>
      <div class="total-label">Celkový pokrok</div>
      <div class="total-amount" id="total-saved-val">0 <span>Kč</span></div>
      <div class="total-sub">z <em id="total-target-val">0 Kč</em></div>
    </div>
    <div class="total-ring">
      <svg viewBox="0 0 64 64" width="64" height="64">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6c63ff"/>
            <stop offset="100%" stop-color="#43e8a0"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="32" cy="32" r="26"/>
        <circle class="ring-fill" id="ring-fill" cx="32" cy="32" r="26"/>
      </svg>
      <div class="ring-label" id="ring-label">0%</div>
    </div>
  </div>

  <div id="goals-container"></div>

  <button class="add-btn" onclick="openModal()">＋ Přidat nový cíl</button>

</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title">Nový <span>Cíl</span></div>
    <div class="form-row">
      <label class="input-label">Název produktu</label>
      <input class="modal-input" id="new-name" placeholder="např. iPhone 15 Pro">
    </div>
    <div class="form-row form-2col">
      <div>
        <label class="input-label">Cena (CZK)</label>
        <input class="modal-input" id="new-price" type="number" placeholder="0">
      </div>
      <div>
        <label class="input-label">Emoji</label>
        <input class="modal-input" id="new-emoji" placeholder="🛒">
      </div>
    </div>
    <div class="form-row">
      <label class="input-label">Obchod</label>
      <input class="modal-input" id="new-shop" placeholder="Alza, Mall, Swappie...">
    </div>
    <div class="form-row">
      <label class="input-label">Odkaz (volitelné)</label>
      <input class="modal-input" id="new-link" type="url" placeholder="https://...">
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Zrušit</button>
      <button class="modal-submit" onclick="addGoal()">Přidat cíl →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let goals = [
  {
    id: 1,
    name: "iPhone 15 256GB Černý Titan",
    price: 14000,
    currency: "CZK",
    link: "https://swappie.com/cz/iphone/iphone-15/iphone-15-256gb-cerna-8/",
    shop: "Swappie",
    saved: 0,
    emoji: "📱",
    created: "2026-03-10"
  }
];

try { const s = localStorage.getItem('sgt-v2'); if (s) goals = JSON.parse(s); } catch(e) {}

function persist() { try { localStorage.setItem('sgt-v2', JSON.stringify(goals)); } catch(e) {} }

function fmt(n) { return n.toLocaleString('cs-CZ') + ' Kč'; }

function updateTotals() {
  const saved  = goals.reduce((s, g) => s + g.saved, 0);
  const target = goals.reduce((s, g) => s + g.price, 0);
  const needed = Math.max(0, target - saved);
  const pct    = target > 0 ? Math.min(100, Math.round((saved / target) * 100)) : 0;

  document.getElementById('hdr-saved').textContent    = fmt(saved);
  document.getElementById('hdr-count').textContent    = goals.length;
  document.getElementById('hdr-needed').textContent   = fmt(needed);
  document.getElementById('total-saved-val').innerHTML = saved.toLocaleString('cs-CZ') + ' <span>Kč</span>';
  document.getElementById('total-target-val').textContent = fmt(target);
  document.getElementById('ring-label').textContent   = pct + '%';
  document.getElementById('ring-fill').style.strokeDashoffset = 163 - (pct / 100) * 163;
}

function render() {
  const c = document.getElementById('goals-container');
  c.innerHTML = '';

  goals.forEach((g, i) => {
    const pct    = g.price > 0 ? Math.min(100, Math.round((g.saved / g.price) * 100)) : 0;
    const needed = Math.max(0, g.price - g.saved);
    const done   = pct >= 100;

    let barCls, chipCls, chipTxt;
    if      (done)    { barCls='done'; chipCls='chip-done'; chipTxt='✓ Máš dost! 🎉'; }
    else if (pct>=75) { barCls='';    chipCls='chip-near'; chipTxt='Skoro tam'; }
    else if (pct>=40) { barCls='mid'; chipCls='chip-mid';  chipTxt='Dobrý progres'; }
    else              { barCls='low'; chipCls='chip-low';  chipTxt='Ještě daleko'; }

    const delBtnHtml = goals.length > 1
      ? `<button class="del-btn" onclick="removeGoal(${g.id})" title="Odstranit">✕</button>`
      : '';

    const div = document.createElement('div');
    div.className = 'goal-card' + (done ? ' complete' : '');
    div.style.animationDelay = (i * 0.08) + 's';
    div.innerHTML = `
      <div class="card-bar"></div>
      <div class="card-header">
        <div class="card-emoji">${g.emoji}</div>
        <div class="card-text">
          <div class="card-name" title="${g.name}">${g.name}</div>
          <div class="card-meta">
            <span class="shop-tag">${g.shop}</span>
            ${g.link ? `<a class="prod-link" href="${g.link}" target="_blank" rel="noopener">↗ odkaz</a>` : ''}
          </div>
        </div>
        <div class="card-price-block">
          <div class="card-price">${g.price.toLocaleString('cs-CZ')}</div>
          <div class="card-price-sub">CZK</div>
        </div>
      </div>
      <div class="card-progress">
        <div class="prog-stats">
          <div class="prog-saved">${fmt(g.saved)}</div>
          <div class="prog-need">chybí <span class="hl">${fmt(needed)}</span></div>
        </div>
        <div class="prog-track">
          <div class="prog-fill ${barCls}" id="bar-${g.id}" style="width:0%"></div>
        </div>
        <div class="prog-footer">
          <span class="status-chip ${chipCls}">${chipTxt}</span>
          <span class="prog-pct">${pct} %</span>
        </div>
      </div>
      <div class="card-inputs">
        <div class="input-group">
          <label class="input-label">Mám naspořeno</label>
          <div class="input-wrap">
            <span class="input-prefix">Kč</span>
            <input class="cash-input" type="number" id="input-${g.id}" value="${g.saved}" min="0" placeholder="0">
          </div>
        </div>
        <button class="save-btn" onclick="updateSaved(${g.id})">Uložit →</button>
        ${delBtnHtml}
      </div>
    `;
    c.appendChild(div);

    requestAnimationFrame(() => {
      setTimeout(() => {
        const bar = document.getElementById('bar-' + g.id);
        if (bar) bar.style.width = pct + '%';
      }, 60 + i * 80);
    });
  });

  updateTotals();
}

function updateSaved(id) {
  const val = Math.max(0, parseFloat(document.getElementById('input-' + id).value) || 0);
  const g = goals.find(x => x.id === id);
  if (!g) return;
  g.saved = val; persist(); render();
  showToast('💾 Uloženo!');
}

function removeGoal(id) {
  if (!confirm('Opravdu odstranit tento cíl?')) return;
  goals = goals.filter(x => x.id !== id); persist(); render();
  showToast('🗑 Cíl odstraněn');
}

function openModal()  { document.getElementById('overlay').classList.add('open'); setTimeout(() => document.getElementById('new-name').focus(), 100); }
function closeModal() { document.getElementById('overlay').classList.remove('open'); }

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && e.target.classList.contains('cash-input')) {
    const id = parseInt(e.target.id.replace('input-', ''));
    if (!isNaN(id)) updateSaved(id);
  }
});

function addGoal() {
  const name  = document.getElementById('new-name').value.trim();
  const price = parseFloat(document.getElementById('new-price').value) || 0;
  const link  = document.getElementById('new-link').value.trim();
  const shop  = document.getElementById('new-shop').value.trim() || 'Neznámý';
  const emoji = document.getElementById('new-emoji').value.trim() || '🛒';
  if (!name || !price) { showToast('⚠ Vyplň název a cenu', true); return; }
  goals.push({ id: Date.now(), name, price, link, shop, emoji, currency: 'CZK', saved: 0, created: new Date().toISOString().slice(0,10) });
  persist(); render(); closeModal();
  ['new-name','new-price','new-link','new-shop','new-emoji'].forEach(id => document.getElementById(id).value = '');
  showToast('✓ Cíl přidán!');
}

let toastTimer;
function showToast(msg, warn = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.color = warn ? 'var(--yellow)' : 'var(--accent3)';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

render();
</script>
</body>
</html>
