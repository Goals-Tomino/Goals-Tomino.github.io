<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Savings Goal Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

:root {
  --bg: #f5f0e8;
  --card: #fefcf7;
  --dark: #1a1410;
  --accent: #e8380d;
  --accent2: #2d6a4f;
  --muted: #8a7f72;
  --border: #e0d9ce;
  --track: #e8e2d9;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--dark);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  padding: 2rem 1.5rem;
  background-image:
    radial-gradient(circle at 10% 10%, rgba(232,56,13,0.04) 0%, transparent 40%),
    radial-gradient(circle at 90% 90%, rgba(45,106,79,0.04) 0%, transparent 40%);
}

.page-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3rem, 8vw, 5.5rem);
  letter-spacing: 0.02em;
  line-height: 0.9;
  margin-bottom: 0.2rem;
  color: var(--dark);
}

.page-title span { color: var(--accent); }

.page-sub {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 2.5rem;
}

/* Goal Card */
.goal-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  max-width: 560px;
  margin: 0 auto 1.5rem;
  box-shadow: 0 2px 20px rgba(0,0,0,0.05), 0 1px 3px rgba(0,0,0,0.04);
  animation: slideUp 0.5s ease both;
}

.goal-card:nth-child(2) { animation-delay: 0.1s; }
.goal-card:nth-child(3) { animation-delay: 0.2s; }

.card-top {
  padding: 1.4rem 1.5rem 1rem;
  display: flex;
  align-items: flex-start;
  gap: 1rem;
  border-bottom: 1px solid var(--border);
}

.card-emoji {
  font-size: 2rem;
  width: 52px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--track);
  border-radius: 12px;
  flex-shrink: 0;
}

.card-info { flex: 1; }

.card-name {
  font-weight: 600;
  font-size: 1rem;
  line-height: 1.3;
  margin-bottom: 0.2rem;
}

.card-shop {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.card-link {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  margin-top: 0.4rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--accent);
  text-decoration: none;
  letter-spacing: 0.05em;
  border-bottom: 1px dashed rgba(232,56,13,0.3);
  transition: border-color 0.2s;
}
.card-link:hover { border-color: var(--accent); }

.card-price {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.9rem;
  color: var(--dark);
  letter-spacing: 0.03em;
  white-space: nowrap;
}

/* Progress section */
.card-progress {
  padding: 1.2rem 1.5rem;
}

.progress-nums {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 0.7rem;
}

.num-saved {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem;
  color: var(--accent2);
  letter-spacing: 0.03em;
}

.num-needed {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 0.05em;
}

.num-needed .hl {
  color: var(--accent);
  font-weight: 500;
}

.progress-track {
  height: 10px;
  background: var(--track);
  border-radius: 99px;
  overflow: hidden;
  position: relative;
  margin-bottom: 0.6rem;
}

.progress-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, var(--accent2), #52b788);
  transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
}

.progress-fill::after {
  content: '';
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 6px;
  background: rgba(255,255,255,0.4);
  border-radius: 99px;
}

.progress-fill.danger {
  background: linear-gradient(90deg, #e8380d, #ff7043);
}
.progress-fill.mid {
  background: linear-gradient(90deg, #e8a20d, #f4c430);
}

.progress-pct {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-align: right;
}

/* Input section */
.card-inputs {
  padding: 1rem 1.5rem 1.4rem;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 0.7rem;
  align-items: flex-end;
}

.input-group { flex: 1; }

.input-label {
  display: block;
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.4rem;
}

.input-wrap {
  position: relative;
}

.input-wrap span {
  position: absolute;
  left: 0.75rem;
  top: 50%;
  transform: translateY(-50%);
  font-family: 'DM Mono', monospace;
  font-size: 0.8rem;
  color: var(--muted);
  pointer-events: none;
}

.cash-input {
  width: 100%;
  padding: 0.6rem 0.75rem 0.6rem 2.2rem;
  background: var(--track);
  border: 1.5px solid transparent;
  border-radius: 8px;
  font-family: 'DM Mono', monospace;
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--dark);
  transition: border-color 0.2s, background 0.2s;
  outline: none;
}

.cash-input:focus {
  border-color: var(--accent2);
  background: #fff;
}

.set-btn {
  padding: 0.62rem 1.1rem;
  background: var(--dark);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  white-space: nowrap;
  flex-shrink: 0;
}
.set-btn:hover { background: var(--accent); transform: translateY(-1px); }
.set-btn:active { transform: translateY(0); }

/* Status badge */
.status-row {
  padding: 0 1.5rem 1.2rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.3rem 0.75rem;
  border-radius: 99px;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 500;
}

.badge-ok {
  background: rgba(45,106,79,0.1);
  color: var(--accent2);
  border: 1px solid rgba(45,106,79,0.2);
}

.badge-warn {
  background: rgba(232,162,13,0.12);
  color: #b87c00;
  border: 1px solid rgba(232,162,13,0.25);
}

.badge-no {
  background: rgba(232,56,13,0.08);
  color: var(--accent);
  border: 1px solid rgba(232,56,13,0.2);
}

/* Add goal button */
.add-btn {
  display: block;
  max-width: 560px;
  margin: 0 auto 1.5rem;
  width: 100%;
  padding: 0.9rem;
  background: transparent;
  border: 1.5px dashed var(--border);
  border-radius: 14px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
  animation: slideUp 0.5s ease both 0.3s;
}
.add-btn:hover { color: var(--dark); border-color: var(--dark); }

/* Add form modal overlay */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(26,20,16,0.5);
  backdrop-filter: blur(4px);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
}
.overlay.open { display: flex; }

.modal {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 18px;
  padding: 1.8rem;
  width: 100%;
  max-width: 420px;
  animation: slideUp 0.3s ease;
}

.modal h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem;
  margin-bottom: 1.2rem;
  letter-spacing: 0.03em;
}

.modal .input-label { margin-top: 0.8rem; }

.modal .cash-input {
  padding-left: 0.75rem;
}

.modal-actions {
  display: flex;
  gap: 0.7rem;
  margin-top: 1.4rem;
}

.modal-actions .set-btn { flex: 1; padding: 0.75rem; }

.cancel-btn {
  flex: 0 0 auto;
  padding: 0.75rem 1rem;
  background: var(--track);
  border: none;
  border-radius: 8px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: color 0.2s;
}
.cancel-btn:hover { color: var(--dark); }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div style="max-width:560px;margin:0 auto;">
  <div class="page-title">SAVING<br><span>GOALS</span></div>
  <div class="page-sub">// kolik mám · kolik potřebuju</div>
</div>

<div id="goals-container"></div>

<button class="add-btn" onclick="openModal()">+ Přidat nový cíl</button>

<!-- Add goal modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Nový Cíl</h2>
    <label class="input-label">Název</label>
    <input class="cash-input" id="new-name" placeholder="např. AirPods Pro" style="padding-left:0.75rem">

    <label class="input-label">Cena (CZK)</label>
    <input class="cash-input" id="new-price" type="number" placeholder="0" style="padding-left:0.75rem">

    <label class="input-label">Link (volitelné)</label>
    <input class="cash-input" id="new-link" type="url" placeholder="https://..." style="padding-left:0.75rem">

    <label class="input-label">Obchod</label>
    <input class="cash-input" id="new-shop" placeholder="Alza, Mall, ..." style="padding-left:0.75rem">

    <label class="input-label">Emoji</label>
    <input class="cash-input" id="new-emoji" placeholder="🎧" style="padding-left:0.75rem; width:80px">

    <div class="modal-actions">
      <button class="cancel-btn" onclick="closeModal()">Zrušit</button>
      <button class="set-btn" onclick="addGoal()">Přidat cíl →</button>
    </div>
  </div>
</div>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────
let goals = [
  {
    id: 1,
    name: "iPhone 15 Pro 256GB Černý Titan",
    price: 15590,
    currency: "CZK",
    link: "https://swappie.com/cz/iphone/iphone-15-pro/iphone-15-pro-256gb-cerny-titan-18/",
    shop: "Swappie",
    saved: 0,
    emoji: "📱",
    created: "2026-03-10"
  }
];

// Load from localStorage if available
try {
  const stored = localStorage.getItem('savings-goals');
  if (stored) goals = JSON.parse(stored);
} catch(e) {}

function save() {
  try { localStorage.setItem('savings-goals', JSON.stringify(goals)); } catch(e) {}
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('goals-container');
  container.innerHTML = '';
  goals.forEach((g, i) => {
    const pct = Math.min(100, Math.round((g.saved / g.price) * 100));
    const needed = Math.max(0, g.price - g.saved);
    const fillClass = pct >= 100 ? 'badge-ok' : pct >= 50 ? 'badge-warn' : 'badge-no';
    const barClass  = pct >= 100 ? '' : pct >= 50 ? 'mid' : 'danger';
    let statusText = pct >= 100 ? '✓ Máš dost!' : pct >= 75 ? 'Skoro tam' : pct >= 50 ? 'Dobrý progres' : pct >= 20 ? 'Šetříš...' : 'Ještě daleko';

    container.innerHTML += `
    <div class="goal-card" style="animation-delay:${i*0.08}s">
      <div class="card-top">
        <div class="card-emoji">${g.emoji}</div>
        <div class="card-info">
          <div class="card-name">${g.name}</div>
          <div class="card-shop">${g.shop}</div>
          ${g.link ? `<a class="card-link" href="${g.link}" target="_blank">Odkaz na produkt ↗</a>` : ''}
        </div>
        <div class="card-price">${g.price.toLocaleString('cs-CZ')} Kč</div>
      </div>

      <div class="card-progress">
        <div class="progress-nums">
          <div class="num-saved">${g.saved.toLocaleString('cs-CZ')} Kč uloženo</div>
          <div class="num-needed">chybí <span class="hl">${needed.toLocaleString('cs-CZ')} Kč</span></div>
        </div>
        <div class="progress-track">
          <div class="progress-fill ${barClass}" style="width:${pct}%"></div>
        </div>
        <div class="progress-pct">${pct} %</div>
      </div>

      <div class="card-inputs">
        <div class="input-group">
          <label class="input-label">Mám cash</label>
          <div class="input-wrap">
            <span>Kč</span>
            <input class="cash-input" type="number" id="input-${g.id}" value="${g.saved}" min="0">
          </div>
        </div>
        <button class="set-btn" onclick="updateSaved(${g.id})">Uložit →</button>
        ${goals.length > 1 ? `<button class="set-btn" style="background:var(--track);color:var(--muted);padding:0.62rem 0.8rem" onclick="removeGoal(${g.id})">✕</button>` : ''}
      </div>

      <div class="status-row">
        <span class="status-badge ${fillClass}">${statusText}</span>
        ${pct >= 100 ? '<span style="font-size:1.2rem">🎉</span>' : ''}
      </div>
    </div>`;
  });
}

function updateSaved(id) {
  const val = parseFloat(document.getElementById('input-' + id).value) || 0;
  const g = goals.find(x => x.id === id);
  if (g) { g.saved = val; save(); render(); }
}

function removeGoal(id) {
  goals = goals.filter(x => x.id !== id);
  save(); render();
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal() { document.getElementById('overlay').classList.add('open'); }
function closeModal() { document.getElementById('overlay').classList.remove('open'); }

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});

function addGoal() {
  const name  = document.getElementById('new-name').value.trim();
  const price = parseFloat(document.getElementById('new-price').value) || 0;
  const link  = document.getElementById('new-link').value.trim();
  const shop  = document.getElementById('new-shop').value.trim() || 'Neznámý';
  const emoji = document.getElementById('new-emoji').value.trim() || '🛒';
  if (!name || !price) return;

  goals.push({
    id: Date.now(),
    name, price, link, shop, emoji,
    currency: 'CZK', saved: 0,
    created: new Date().toISOString().slice(0,10)
  });
  save(); render(); closeModal();
  ['new-name','new-price','new-link','new-shop','new-emoji'].forEach(id => document.getElementById(id).value = '');
}

render();
</script>
</body>
</html>
